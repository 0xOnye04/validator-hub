version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kiichain-postgres
    restart: always
    environment:
      POSTGRES_USER: kiichain
      POSTGRES_PASSWORD: kiichain_password
      POSTGRES_DB: kiichain_validator_hub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kiichain"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kiichain-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://kiichain:kiichain_password@postgres:5432/kiichain_validator_hub
      - KII_NODE_RPC=http://localhost:26657
      - KII_NODE_API=http://localhost:1317
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kiichain-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
